syntax = "proto3";

option java_package = "org.ilynosov.hw5.producer.proto";
option java_outer_classname = "MovieEventProto";
option java_multiple_files = false;

enum EventType {
  VIEW_STARTED = 0;
  VIEW_FINISHED = 1;
  VIEW_PAUSED = 2;
  VIEW_RESUMED = 3;
  LIKED = 4;
  SEARCHED = 5;
}

enum DeviceType {
  MOBILE = 0;
  DESKTOP = 1;
  TV = 2;
  TABLET = 3;
}

message MovieEvent {
  string event_id = 1;
  string user_id = 2;
  string movie_id = 3;
  EventType event_type = 4;
  int64 timestamp = 5;
  DeviceType device_type = 6;
  string session_id = 7;
  int32 progress_seconds = 8;
}
